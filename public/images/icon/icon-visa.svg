<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Passport outline -->
  <rect x="8" y="4" width="20" height="26" rx="3" stroke="white" stroke-width="2" fill="none"/>
  <!-- Passport spine line -->
  <line x1="13" y1="4" x2="13" y2="30" stroke="white" stroke-width="1.5"/>
  <!-- Horizontal lines (page lines) -->
  <line x1="16" y1="12" x2="25" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stamp circle -->
  <circle cx="22" cy="23" r="5" stroke="white" stroke-width="1.5" fill="none" stroke-dasharray="2 1.5"/>
  <!-- Checkmark inside stamp -->
  <path d="M19.5 23 L21.5 25 L25 20.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
